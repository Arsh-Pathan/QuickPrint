<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="QuickPrint">
  <title>QuickPrint</title>

  <!--
    QuickPrint wordmark + icon
    Palette: blue (#0B5FFF, #4D8BFF) on white background.
    Designed for use in app headers, README, and as the icon source
    for the Windows installer (after rasterisation to a square crop).
  -->

  <defs>
    <linearGradient id="qpGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0B5FFF"/>
      <stop offset="100%" stop-color="#4D8BFF"/>
    </linearGradient>
  </defs>

  <!-- =======================  Icon mark  ======================= -->
  <!-- A stylised printer with a sheet of paper emerging.          -->
  <!-- The group is anchored at (20,20) inside a 180x180 area.     -->
  <g transform="translate(20,20)">
    <!-- Speed lines (suggesting "quick") behind the printer -->
    <rect x="-4"  y="74"  width="14" height="6" rx="3" fill="#4D8BFF" opacity="0.85"/>
    <rect x="-14" y="90"  width="24" height="6" rx="3" fill="#4D8BFF" opacity="0.6"/>
    <rect x="-4"  y="106" width="14" height="6" rx="3" fill="#4D8BFF" opacity="0.4"/>

    <!-- Printer top slot (paper feeder) -->
    <rect x="35" y="40" width="90" height="38" rx="6" ry="6" fill="#FFFFFF"/>

    <!-- Printer main body -->
    <rect x="10" y="60" width="140" height="80" rx="14" ry="14" fill="url(#qpGrad)"/>

    <!-- White paper sheet emerging from the bottom -->
    <rect x="35" y="95" width="90" height="58" rx="4" ry="4" fill="#FFFFFF"/>

    <!-- Lines on the paper (suggesting printed text) -->
    <rect x="48" y="108" width="64" height="6" rx="2" fill="#0B5FFF"/>
    <rect x="48" y="122" width="50" height="6" rx="2" fill="#4D8BFF"/>
    <rect x="48" y="136" width="40" height="6" rx="2" fill="#4D8BFF"/>

    <!-- Status indicator dot on the printer body -->
    <circle cx="132" cy="76" r="5" fill="#FFFFFF"/>
  </g>

  <!-- =======================  Wordmark  ======================= -->
  <g font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif">
    <text x="210" y="118"
          font-size="78"
          font-weight="500"
          fill="#FFFFFF"
          letter-spacing="-1">Quick Print</text>

    <!-- Underline accent -->
    <rect x="210" y="138" width="200" height="5" rx="2.5" fill="#4D8BFF"/>

    <!-- Tagline -->
    <text x="210" y="172"
          font-size="20"
          font-weight="500"
          fill="#FFFFFF"
          letter-spacing="3">AUTONOMOUS PRINT SHOP</text>
  </g>
</svg>
