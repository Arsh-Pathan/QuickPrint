services:
  postgres:
    image: postgres:16-alpine
    container_name: quickprint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quickprint
      POSTGRES_PASSWORD: quickprint
      POSTGRES_DB: quickprint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickprint"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: quickprint-backend
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    env_file:
      - apps/backend/.env
    environment:
      - DATABASE_URL=postgresql://quickprint:quickprint@postgres:5432/quickprint?schema=public

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: quickprint-web
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=http://localhost:4000
    depends_on:
      - backend

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: quickprint-admin
    restart: on-failure
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=http://localhost:4000
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: quickprint-cloudflared
    restart: unless-stopped
    command: tunnel --url http://web:3000
    depends_on:
      - web

volumes:
  postgres_data:
