services:
  postgres:
    image: postgres:16-alpine
    container_name: quickprint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quickprint
      POSTGRES_PASSWORD: quickprint
      POSTGRES_DB: quickprint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickprint"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
